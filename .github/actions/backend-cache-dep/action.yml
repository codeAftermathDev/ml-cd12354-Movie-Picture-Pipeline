name: Backend Cache Dependencies

description: Setup backend for downstream jobs

inputs:
  WORKING-DIR:
    description: The working directory of the application
    default: .
    required: false

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version-file: ${{ inputs.WORKING-DIR }}/.python-version
    - name: Setup pipenv
      id: setup-pipenv
      run: |
        pip install pipenv flake8
        pipenv --version
      env:
        PIPENV_VENV_IN_PROJECT: "1"
      shell: bash
      working-directory: ${{ inputs.WORKING-DIR }}
    - name: Cache dependencies
      id: cache
      uses: actions/cache@v5
      with:
        path: |
          ${{ inputs.WORKING-DIR }}/.venv
          ~/.cache/pip
        key: be-venv-${{ hashFiles(format('{0}/{1}', inputs.WORKING-DIR, '.python-version')) }}-${{ hashFiles(format('{0}/{1}', inputs.WORKING-DIR, 'Pipfile.lock')) }}
    - name: Install Dependencies
      if: steps.cache.outputs.cache-hit != true
      run: |
        echo "Cache not found, installing dependencies..."
        pipenv install --deploy --ignore-pipfile # Flags produces a more deterministic build artifact
      shell: bash
      working-directory: ${{ inputs.WORKING-DIR }}
      env:
        PIPENV_VENV_IN_PROJECT: "1"
