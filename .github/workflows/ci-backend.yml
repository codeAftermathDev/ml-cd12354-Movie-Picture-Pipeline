name: CI - Movie Picture Application Backend

on: 
  - workflow_dispatch
  - workflow_call

env:
  WORKING_DIR: starter/backend

# Need ID token write permission to use OIDC
permissions:
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Backend Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            ${{ env.WORKING_DIR }}
      - name: Cache dependencies
        id: setup-backend
        uses: ./.github/actions/backend-cache-dep
        with:
          WORKING-DIR: ${{ env.WORKING_DIR }}
  lint:
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout Backend Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            ${{ env.WORKING_DIR }}
      - name: Cache dependencies
        id: setup-backend
        uses: ./.github/actions/backend-cache-dep
        with:
          WORKING-DIR: ${{ env.WORKING_DIR }}
      - name: Run Lint
        run: | 
          pip install flake8
          flake8 --version
          pipenv run lint
      # # Step to verify CI fails on lint errors
      # - name: Run Lint EXPECT CI FAIL
      #   run: FAIL_LINT=true pipenv run lint
  test:
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout Backend Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            ${{ env.WORKING_DIR }}
      - name: Cache dependencies
        id: setup-backend
        uses: ./.github/actions/backend-cache-dep
        with:
          WORKING-DIR: ${{ env.WORKING_DIR }}
      - name: Run Tests
        run: pipenv run test
      # # Step to verify CI fails on test errors
      # - name: Run Tests EXPECT CI FAIL
      #   run: FAIL_TEST=true pipenv run test
  build:
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout Backend Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            ${{ env.WORKING_DIR }}
      - name: Cache dependencies
        id: setup-backend
        uses: ./.github/actions/backend-cache-dep
        with:
          WORKING-DIR: ${{ env.WORKING_DIR }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.MP_BACKEND_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
