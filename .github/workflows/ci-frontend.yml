name: CI - Movie Picture Application Frontend

on: 
  workflow_dispatch:
  workflow_call:

env:
  WORKING_DIR: starter/frontend

# Need ID token write permission to use OIDC
permissions:
  id-token: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Frontend Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            ${{ env.WORKING_DIR }}
      - name: Cache dependencies
        id: setup-frontend
        uses: ./.github/actions/frontend-cache-dep
        with:
          WORKING-DIR: ${{ env.WORKING_DIR }}
  lint:
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout Frontend Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            ${{ env.WORKING_DIR }}
      - name: Setup
        id: setup-frontend
        uses: ./.github/actions/frontend-cache-dep
        with:
          WORKING-DIR: ${{ env.WORKING_DIR }}
      - name: Run Lint
        run: npm run lint
      # # Step to verify CI fails on lint errors
      # - name: Run Lint EXPECT CI FAIL
      #   run: FAIL_LINT=true npm run lint
  test:
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout Frontend Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            ${{ env.WORKING_DIR }}
      - name: Setup
        id: setup-frontend
        uses: ./.github/actions/frontend-cache-dep
        with:
          WORKING-DIR: ${{ env.WORKING_DIR }}
      - name: Run Tests
        run: CI=true npm test
      # # Step to verify CI fails on test errors
      # - name: Run Tests EXPECT CI FAIL
      #   run: FAIL_TEST=true CI=true npm test
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    needs: [ lint, test ]
    steps:
      - name: Checkout Frontend Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            ${{ env.WORKING_DIR }}
      - name: Setup
        id: setup-frontend
        uses: ./.github/actions/frontend-cache-dep
        with:
          WORKING-DIR: ${{ env.WORKING_DIR }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.MP_FRONTEND_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
          --build-arg=REACT_APP_MOVIE_API_URL=${{ vars.MP_BACKEND_API_URL }} \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
